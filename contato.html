<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
</head>

 <style>
        header {
            text-align: center;
        }
    </style>
</head>

<body id="topo">

    <header>
<h5 style="text-align:center;">ANAM</h5>
<h2 style="text-align:center;">Academia Nijika de Artes Musicais</h2>


        <form>
<fieldset>
<legend>Formulário de Contato</legend>
<label>Nome:</label> <br>
<input type="text" placeholder="Digite seu nome"><br>
<br>
<label> E-mail:</label> <br>
<input type="email" placeholder="email@gmail.com"><br>
<br>
<label> Senha:</label> <br>
<input type="password"  placeholder="senha"><br>
<br>
<label> Matrícula:</label> <br>
<input type="text"  placeholder="código da Matrícula"><br>
<br>
<label>Número:</label> <br>
<input type="tel" placeholder="(00)00000-0000"><br>
<br>
<legend> Curso Realizado:</legend>
<select>
<option>Baixo</option>
<option>Bateria</option>
<option>Guitarra</option>
<option>Vocal</option>
</select><br>
</fieldset>
<br>
<div class="buttons">
<button type="submit">Enviar</button>
<button type="reset">Reiniciar</button>
</form>
    </header>

</body>
</html>
